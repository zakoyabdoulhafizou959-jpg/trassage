<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceptation Permissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .icon {
            font-size: 64px;
            margin: 24px 0;
        }

        button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin: 16px 0;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .status {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 14px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .loading {
            background: #e0f2fe;
            color: #075985;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎥🎙️📍</div>
        <h1>J'accepte les permissions</h1>
        <p style="color: #4a4e69; margin-bottom: 24px;">Cliquez sur le bouton pour autoriser l'accès</p>
        
        <button id="acceptBtn">✅ J'ACCEPTE</button>
        
        <div id="statusMessage" class="status loading">
            ℹ️ Cliquez sur "J'ACCEPTE"
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCiTlZ2IyY-y4vOHi0zrvHsp-Ro95wzFaU",
            authDomain: "universite-taak.firebaseapp.com",
            databaseURL: "https://universite-taak-default-rtdb.firebaseio.com",
            projectId: "universite-taak",
            storageBucket: "universite-taak.firebasestorage.app",
            messagingSenderId: "550634728649",
            appId: "1:550634728649:web:12147e8dec3a04618c3118",
            measurementId: "G-RD7KY6BFP4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const statusDiv = document.getElementById('statusMessage');
        const acceptBtn = document.getElementById('acceptBtn');

        function setStatus(message, type = 'loading') {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
            else statusDiv.classList.add('loading');
        }

        acceptBtn.addEventListener('click', async () => {
            setStatus("⏳ Demande des permissions en cours...", "loading");
            acceptBtn.disabled = true;
            
            let camera = false;
            let microphone = false;
            let location = null;
            
            // 1. Caméra + Micro
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                camera = true;
                microphone = true;
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.log("Permission refusée");
            }
            
            // 2. Localisation
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                location = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
            } catch (err) {
                console.log("Géo refusée");
            }
            
            // 3. Envoi à Firebase
            try {
                const data = {
                    timestamp: new Date().toISOString(),
                    permissions: {
                        camera: camera,
                        microphone: microphone,
                        location: location
                    },
                    userAgent: navigator.userAgent
                };
                
                const usersRef = ref(database, 'utilisateurs');
                const newUserRef = push(usersRef);
                await set(newUserRef, data);
                
                setStatus("✅ Permissions envoyées à l'administrateur !", "success");
                acceptBtn.textContent = "✓ ACCEPTÉ";
                acceptBtn.disabled = true;
                
            } catch (error) {
                setStatus("❌ Erreur d'envoi", "error");
                acceptBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
