<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Streamer - Utilisateur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .live-pulse { animation: pulse-red 1.5s infinite; }
        .audio-wave {
            display: inline-block;
            width: 3px;
            height: 12px;
            background-color: #10b981;
            margin: 0 1px;
            animation: wave 0.5s infinite ease-in-out;
        }
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 12px; }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-950 via-slate-900 to-indigo-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900/95 border border-slate-800 text-white rounded-3xl p-6 max-w-md w-full shadow-2xl backdrop-blur-md">
        <div class="text-center mb-6">
            <span class="inline-block p-3 bg-indigo-500/10 rounded-2xl text-indigo-400 text-3xl mb-3">📡</span>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Émetteur WebRTC Live</h1>
            <p class="text-slate-400 text-sm mt-1">Partagez votre caméra, micro et position GPS</p>
        </div>

        <div class="relative rounded-2xl overflow-hidden bg-black aspect-video mb-4 border border-slate-800">
            <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
            <div id="noStreamPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 text-slate-500 z-10 transition-opacity duration-300">
                <span class="text-4xl mb-2">📹</span>
                <p class="text-xs font-semibold">Caméra inactive</p>
            </div>
            <div id="liveBadge" class="hidden absolute top-3 left-3 bg-red-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full items-center gap-1.5 shadow-lg z-20">
                <span class="w-2 h-2 rounded-full bg-white live-pulse"></span>
                DIFFUSION ACTIVE
            </div>
            <div id="micBadge" class="hidden absolute top-3 right-3 bg-emerald-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full items-center gap-1.5 shadow-lg z-20">
                <span class="audio-wave"></span>
                <span class="audio-wave" style="animation-delay: 0.1s"></span>
                <span class="audio-wave" style="animation-delay: 0.2s"></span>
                MICRO ACTIF
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 text-xs">
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50">
                <span class="text-slate-500 block mb-0.5">Identifiant unique</span>
                <span id="diagUserId" class="font-mono text-indigo-400 font-bold">---</span>
            </div>
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50">
                <span class="text-slate-500 block mb-0.5">État WebRTC</span>
                <span id="diagWebRTCState" class="font-mono text-amber-400 font-bold">Inactif</span>
            </div>
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50 col-span-2">
                <span class="text-slate-500 block mb-0.5">Statut GPS & Audio</span>
                <span id="diagGps" class="text-slate-300 font-semibold">Recherche...</span>
            </div>
        </div>

        <div class="space-y-3">
            <button id="startBtn" class="w-full py-4 px-6 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold rounded-2xl shadow-lg transition-all transform active:scale-95">
                🚀 Activer la diffusion (Caméra + Micro)
            </button>
            <button id="stopBtn" disabled class="w-full py-3 px-6 bg-slate-800 hover:bg-red-900 hover:text-white text-slate-400 font-semibold rounded-2xl transition-all disabled:opacity-30 disabled:pointer-events-none">
                ⏹️ Arrêter le flux
            </button>
        </div>

        <div id="statusMessage" class="mt-4 p-3 bg-slate-950 border border-slate-800 rounded-xl text-center text-xs text-slate-400">
            ℹ️ Prêt à démarrer. Autorisez la caméra et le microphone.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, off, remove } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiTlZ2IyY-y4vOHi0zrvHsp-Ro95wzFaU",
            authDomain: "universite-taak.firebaseapp.com",
            databaseURL: "https://universite-taak-default-rtdb.firebaseio.com",
            projectId: "universite-taak",
            storageBucket: "universite-taak.firebasestorage.app",
            messagingSenderId: "550634728649",
            appId: "1:550634728649:web:12147e8dec3a04618c3118"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const userId = Math.random().toString(36).substring(2, 8).toUpperCase(); 
        document.getElementById('diagUserId').innerText = userId;

        let localStream = null;
        let peerConnection = null;
        let isStreaming = false;
        let heartbeatInterval = null;
        let answerListener = null;
        let adminCandidateListener = null;
        let candidateQueue = [];
        let gpsWatchId = null;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('statusMessage');
        const localVideo = document.getElementById('localVideo');
        const placeholder = document.getElementById('noStreamPlaceholder');
        const liveBadge = document.getElementById('liveBadge');
        const micBadge = document.getElementById('micBadge');
        const diagWebRTCState = document.getElementById('diagWebRTCState');
        const diagGps = document.getElementById('diagGps');

        const deviceType = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? "📱 Mobile" : "💻 Ordinateur";

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        function setStatus(message, isError = false) {
            statusDiv.innerHTML = message;
            statusDiv.className = isError 
                ? 'mt-4 p-3 bg-red-950/50 border border-red-900 text-red-300 rounded-xl text-center text-xs'
                : 'mt-4 p-3 bg-slate-950 border border-slate-800 rounded-xl text-center text-xs text-indigo-300';
        }

        async function updatePresence() {
            try {
                const presenceRef = ref(database, `users/${userId}`);
                await set(presenceRef, {
                    active: isStreaming,
                    lastActive: Date.now(),
                    device: deviceType,
                    hasAudio: localStream?.getAudioTracks().length > 0,
                    timestamp: Date.now()
                });
            } catch (err) {
                console.error("Erreur heartbeat:", err);
            }
        }

        updatePresence();
        heartbeatInterval = setInterval(updatePresence, 3000);

        async function startSharing() {
            try {
                setStatus("🎤 Demande d'accès à la caméra et au microphone...");
                
                // Capture vidéo + audio
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640, max: 1280 },
                        height: { ideal: 480, max: 720 },
                        frameRate: { ideal: 15, max: 24 }
                    }, 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 48000
                    }
                });
                
                localVideo.srcObject = localStream;
                placeholder.style.opacity = '0';
                setTimeout(() => placeholder.style.display = 'none', 300);
                
                // Vérifier et afficher le statut audio
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    micBadge.style.display = 'flex';
                    setStatus(`✅ Micro actif : ${audioTracks[0].label}`, false);
                } else {
                    setStatus("⚠️ Aucun micro détecté, seulement la vidéo sera transmise", true);
                }
                
                peerConnection = new RTCPeerConnection(rtcConfig);
                diagWebRTCState.innerText = "Créé";

                // Ajouter TOUTES les pistes (vidéo + audio)
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log(`📡 Piste ajoutée: ${track.kind} - ${track.label}`);
                });

                peerConnection.onconnectionstatechange = () => {
                    diagWebRTCState.innerText = peerConnection.connectionState.toUpperCase();
                    if (peerConnection.connectionState === 'connected') {
                        setStatus("🔴 Connexion établie - Diffusion en cours");
                    }
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        const candidateRef = ref(database, `webrtc/${userId}/candidates`);
                        push(candidateRef, event.candidate.toJSON());
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                const offerRef = ref(database, `webrtc/${userId}/offer`);
                await set(offerRef, {
                    sdp: offer.sdp,
                    type: offer.type,
                    timestamp: Date.now()
                });

                setStatus("📡 En attente de connexion de l'administrateur...");

                const answerRef = ref(database, `webrtc/${userId}/answer`);
                answerListener = onValue(answerRef, async (snapshot) => {
                    const answer = snapshot.val();
                    if (answer && peerConnection && !peerConnection.currentRemoteDescription) {
                        setStatus("⚡ Réponse reçue, établissement du flux...");
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));

                        while (candidateQueue.length > 0) {
                            const candidate = candidateQueue.shift();
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.warn(e));
                        }
                    }
                });

                const adminCandidatesRef = ref(database, `webrtc/${userId}/admin-candidates`);
                adminCandidateListener = onValue(adminCandidatesRef, (snapshot) => {
                    const candidates = snapshot.val();
                    if (candidates) {
                        Object.values(candidates).forEach(candidate => {
                            if (peerConnection && peerConnection.currentRemoteDescription) {
                                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.warn(e));
                            } else {
                                candidateQueue.push(candidate);
                            }
                        });
                    }
                });

                // GPS
                if (navigator.geolocation) {
                    diagGps.innerText = "Recherche position GPS...";
                    gpsWatchId = navigator.geolocation.watchPosition(
                        async (position) => {
                            const locationRef = ref(database, `users/${userId}/location`);
                            await set(locationRef, {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                                timestamp: Date.now()
                            });
                            diagGps.innerHTML = `📍 GPS: <span class="text-green-400">${position.coords.latitude.toFixed(5)}, ${position.coords.longitude.toFixed(5)}</span> | 🎤 Micro: <span class="text-emerald-400">ACTIF</span>`;
                        },
                        () => { diagGps.innerText = "❌ Signal GPS instable"; },
                        { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
                    );
                } else {
                    diagGps.innerText = "❌ GPS non supporté";
                }

                isStreaming = true;
                await updatePresence();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                liveBadge.style.display = 'flex';

            } catch (err) {
                setStatus("❌ Erreur: " + err.message, true);
                console.error(err);
            }
        }

        async function stopSharing() {
            isStreaming = false;
            await updatePresence();

            if (gpsWatchId) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }

            if (answerListener) off(ref(database, `webrtc/${userId}/answer`));
            if (adminCandidateListener) off(ref(database, `webrtc/${userId}/admin-candidates`));

            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            localVideo.srcObject = null;
            placeholder.style.display = 'flex';
            placeholder.style.opacity = '1';
            liveBadge.style.display = 'none';
            micBadge.style.display = 'none';
            diagWebRTCState.innerText = "Inactif";
            diagGps.innerText = "Recherche...";

            await remove(ref(database, `webrtc/${userId}`));

            setStatus("⏹️ Flux arrêté.");
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        startBtn.addEventListener('click', startSharing);
        stopBtn.addEventListener('click', stopSharing);

        window.addEventListener('beforeunload', () => {
            if (userId) {
                set(ref(database, `users/${userId}`), null);
                remove(ref(database, `webrtc/${userId}`));
            }
        });
    </script>
</body>
</html>
