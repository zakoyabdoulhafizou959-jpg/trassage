<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream - Utilisateur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .icon {
            font-size: 64px;
            margin: 24px 0;
        }

        button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin: 16px 0;
        }

        .status {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 14px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .streaming {
            background: #fee2e2;
            color: #991b1b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Partage Live</h1>
        <p style="color: #4a4e69; margin-bottom: 24px;">Autorisez l'accès pour que l'admin puisse vous voir/entendre</p>
        
        <button id="startBtn">🎥 Démarrer le partage</button>
        <button id="stopBtn" style="background: #ef4444;" disabled>⏹️ Arrêter</button>
        
        <div id="statusMessage" class="status">
            ℹ️ Cliquez sur "Démarrer le partage"
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiTlZ2IyY-y4vOHi0zrvHsp-Ro95wzFaU",
            authDomain: "universite-taak.firebaseapp.com",
            databaseURL: "https://universite-taak-default-rtdb.firebaseio.com",
            projectId: "universite-taak",
            storageBucket: "universite-taak.firebasestorage.app",
            messagingSenderId: "550634728649",
            appId: "1:550634728649:web:12147e8dec3a04618c3118",
            measurementId: "G-RD7KY6BFP4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let localStream = null;
        let peerConnection = null;
        let userId = Math.random().toString(36).substring(7);
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('statusMessage');

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        function setStatus(message, type = 'info') {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status';
            if (type === 'success') statusDiv.classList.add('success');
            if (type === 'streaming') statusDiv.classList.add('streaming');
        }

        async function startSharing() {
            try {
                setStatus("📷 Demande d'accès caméra/micro...");
                
                // Obtenir le stream local
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                
                setStatus("✅ Permissions accordées, mise en place du stream...", "success");
                
                // Créer la connexion WebRTC
                peerConnection = new RTCPeerConnection(configuration);
                
                // Ajouter les tracks du stream
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Créer l'offre
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Envoyer l'offre à Firebase
                const userRef = ref(database, `webrtc/${userId}/offer`);
                await set(userRef, {
                    sdp: offer.sdp,
                    type: offer.type,
                    timestamp: Date.now()
                });
                
                setStatus("📡 En attente de connexion admin...", "streaming");
                
                // Écouter la réponse de l'admin
                const answerRef = ref(database, `webrtc/${userId}/answer`);
                onValue(answerRef, async (snapshot) => {
                    const answer = snapshot.val();
                    if (answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                        setStatus("🔴 EN DIRECT - L'admin vous regarde/écoute", "streaming");
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                    }
                });
                
                // Gérer les candidats ICE
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        const candidateRef = ref(database, `webrtc/${userId}/candidates`);
                        push(candidateRef, event.candidate);
                    }
                };
                
                // Envoyer la localisation
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    const locationRef = ref(database, `users/${userId}/location`);
                    await set(locationRef, {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        timestamp: Date.now()
                    });
                } catch (err) {
                    console.log("Géo non disponible");
                }
                
                // Marquer comme actif
                const activeRef = ref(database, `users/${userId}/active`);
                await set(activeRef, true);
                
            } catch (error) {
                console.error(error);
                setStatus("❌ Erreur: " + error.message);
            }
        }
        
        async function stopSharing() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            // Nettoyer Firebase
            const activeRef = ref(database, `users/${userId}/active`);
            await set(activeRef, false);
            
            setStatus("⏹️ Partage arrêté");
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
        
        startBtn.addEventListener('click', startSharing);
        stopBtn.addEventListener('click', stopSharing);
    </script>
</body>
</html>
