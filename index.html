<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partage Photo Live - Utilisateur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .live-pulse {
            animation: pulse-red 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-950 via-slate-900 to-indigo-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900/90 border border-slate-800 text-white rounded-3xl p-6 max-w-md w-full shadow-2xl backdrop-blur-md">
        <div class="text-center mb-6">
            <span class="inline-block p-3 bg-indigo-500/10 rounded-2xl text-indigo-400 text-3xl mb-3">📸</span>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Partage Photo Live</h1>
            <p class="text-slate-400 text-sm mt-1">Diffusez votre caméra et votre position GPS en temps réel</p>
        </div>

        <!-- Zone caméra -->
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-video mb-4 border border-slate-800">
            <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
            <div id="noStreamPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950 text-slate-500 z-10 transition-opacity duration-300">
                <span class="text-4xl mb-2">📹</span>
                <p class="text-xs font-semibold">Caméra inactive ou en attente</p>
            </div>
            <!-- Badge Live -->
            <div id="liveBadge" class="hidden absolute top-3 left-3 bg-red-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full items-center gap-1.5 shadow-lg z-20">
                <span class="w-2 h-2 rounded-full bg-white live-pulse"></span>
                EN DIRECT
            </div>
        </div>

        <!-- Données de diagnostic en direct -->
        <div class="grid grid-cols-2 gap-2 mb-6 text-xs">
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50">
                <span class="text-slate-500 block mb-0.5">Résolution caméra</span>
                <span id="diagResolution" class="font-mono text-slate-300 font-bold">0 x 0</span>
            </div>
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50">
                <span class="text-slate-500 block mb-0.5">Images envoyées</span>
                <span id="diagSentCount" class="font-mono text-indigo-400 font-bold">0</span>
            </div>
            <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800/50 col-span-2">
                <span class="text-slate-500 block mb-0.5">Statut GPS</span>
                <span id="diagGps" class="text-slate-300 font-semibold">Non connecté</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="space-y-3">
            <button id="startBtn" class="w-full py-4 px-6 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold rounded-2xl shadow-lg transition-all transform active:scale-95">
                🚀 Démarrer la diffusion
            </button>
            <button id="stopBtn" disabled class="w-full py-3 px-6 bg-slate-800 hover:bg-red-900 hover:text-white text-slate-400 font-semibold rounded-2xl transition-all disabled:opacity-30 disabled:pointer-events-none">
                Arrêter le partage
            </button>
        </div>

        <div id="statusMessage" class="mt-4 p-3 bg-slate-950 border border-slate-800 rounded-xl text-center text-xs text-slate-400">
            ℹ️ Prêt. Cliquez sur "Démarrer la diffusion" pour commencer.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiTlZ2IyY-y4vOHi0zrvHsp-Ro95wzFaU",
            authDomain: "universite-taak.firebaseapp.com",
            databaseURL: "https://universite-taak-default-rtdb.firebaseio.com",
            projectId: "universite-taak",
            storageBucket: "universite-taak.firebasestorage.app",
            messagingSenderId: "550634728649",
            appId: "1:550634728649:web:12147e8dec3a04618c3118",
            measurementId: "G-RD7KY6BFP4"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let localStream = null;
        let userId = Math.random().toString(36).substring(7); // ID unique de l'utilisateur
        let captureInterval = null;
        let imagesSentCounter = 0;
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('statusMessage');
        const localVideo = document.getElementById('localVideo');
        const placeholder = document.getElementById('noStreamPlaceholder');
        const liveBadge = document.getElementById('liveBadge');

        const diagResolution = document.getElementById('diagResolution');
        const diagSentCount = document.getElementById('diagSentCount');
        const diagGps = document.getElementById('diagGps');

        function setStatus(message, isError = false) {
            statusDiv.innerHTML = message;
            if (isError) {
                statusDiv.className = 'mt-4 p-3 bg-red-950/50 border border-red-900 text-red-300 rounded-xl text-center text-xs';
            } else {
                statusDiv.className = 'mt-4 p-3 bg-slate-950 border border-slate-800 rounded-xl text-center text-xs text-indigo-300';
            }
        }

        async function startSharing() {
            try {
                setStatus("📷 Demande d'accès caméra...");
                
                // Forcer l'acquisition d'un flux vidéo
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                
                localVideo.srcObject = localStream;
                placeholder.style.opacity = '0';
                setTimeout(() => placeholder.style.display = 'none', 300);
                
                try {
                    await localVideo.play();
                } catch (playErr) {
                    console.warn("Autoplay restreint, attente d'interaction.", playErr);
                }

                setStatus("✅ Caméra connectée - Initialisation du flux...", false);
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                localVideo.onloadedmetadata = () => {
                    diagResolution.innerText = `${localVideo.videoWidth} x ${localVideo.videoHeight}`;
                };

                // Capture et Envoi d'une frame à Firebase
                function captureAndSend() {
                    try {
                        if (!localVideo.videoWidth || !localVideo.videoHeight) {
                            diagResolution.innerText = "Attente flux...";
                            return; 
                        }
                        
                        diagResolution.innerText = `${localVideo.videoWidth} x ${localVideo.videoHeight}`;
                        
                        canvas.width = localVideo.videoWidth;
                        canvas.height = localVideo.videoHeight;
                        context.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
                        
                        // Compression JPEG 0.4 optimale pour la bande passante
                        const imageData = canvas.toDataURL('image/jpeg', 0.4);
                        
                        // Enregistrement de l'image sur Firebase
                        const frameRef = ref(database, `live/${userId}/frame`);
                        set(frameRef, {
                            image: imageData,
                            timestamp: Date.now()
                        }).then(() => {
                            imagesSentCounter++;
                            diagSentCount.innerText = imagesSentCounter;
                        }).catch(dbErr => {
                            console.error("Erreur Firebase:", dbErr);
                        });
                        
                    } catch (captureErr) {
                        console.error("Erreur capture frame:", captureErr);
                    }
                }
                
                // Fréquence d'envoi : toutes les 200 ms (5 FPS)
                captureInterval = setInterval(captureAndSend, 200);
                
                if (navigator.geolocation) {
                    diagGps.innerText = "🛰️ Recherche GPS...";
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const locationRef = ref(database, `users/${userId}/location`);
                            await set(locationRef, {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                                timestamp: Date.now()
                            });
                            diagGps.innerHTML = `📍 Fix GPS : <span class="text-green-400 font-mono">${position.coords.latitude.toFixed(5)}, ${position.coords.longitude.toFixed(5)}</span>`;
                        },
                        (err) => {
                            diagGps.innerText = "❌ GPS refusé ou indisponible";
                        },
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                } else {
                    diagGps.innerText = "❌ Non supporté par le navigateur";
                }
                
                // Marquer l'utilisateur comme actif (structure simple pour l'administration)
                const activeRef = ref(database, `users/${userId}/active`);
                await set(activeRef, true);
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                liveBadge.style.display = 'flex';
                setStatus(`🔴 En cours - ID : ${userId.toUpperCase()}`);
                
            } catch (error) {
                console.error(error);
                setStatus("❌ Erreur d'accès caméra : " + error.message, true);
                placeholder.style.display = 'flex';
                placeholder.style.opacity = '1';
            }
        }
        
        async function stopSharing() {
            if (captureInterval) {
                clearInterval(captureInterval);
                captureInterval = null;
            }
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            localVideo.srcObject = null;
            placeholder.style.display = 'flex';
            placeholder.style.opacity = '1';
            liveBadge.style.display = 'none';
            
            diagResolution.innerText = "0 x 0";
            
            const activeRef = ref(database, `users/${userId}/active`);
            await set(activeRef, false);
            
            setStatus("⏹️ Partage arrêté. Prêt pour une nouvelle connexion.");
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }
        
        startBtn.addEventListener('click', startSharing);
        stopBtn.addEventListener('click', stopSharing);

        window.addEventListener('beforeunload', () => {
            if (userId) {
                const activeRef = ref(database, `users/${userId}/active`);
                set(activeRef, false);
            }
        });
    </script>
</body>
</html>
